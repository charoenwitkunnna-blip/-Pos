name: Bloxd 6-Hour Bot

on:
  workflow_dispatch: 
  schedule:
    - cron: '0 */6 * * *' 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360 
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Install Display Server for Headless WebGL
        run: sudo apt-get install -y xvfb

      - name: Run Bot
        env:
          # This pulls your secret webhook safely into the bot
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: xvfb-run --auto-servernum npm start
